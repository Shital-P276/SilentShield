<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SilentShield</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Tailwind CSS CDN for quick modern look -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-80 bg-gray-900 text-white">
  <div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <h1 class="text-2xl font-bold text-emerald-400">SilentShield</h1>
      </div>
      <span id="status" class="text-xs px-2 py-1 bg-emerald-500/20 text-emerald-400 rounded-full">Active</span>
    </div>

    <!-- Safety Score -->
    <div class="bg-gray-800 rounded-xl p-5 mb-6 text-center">
      <p class="text-sm text-gray-400 mb-1">Your Feed Safety</p>
      <div id="safety-score" class="text-6xl font-bold text-emerald-400">92%</div>
      <p class="text-xs text-gray-500 mt-2">Protected by AI</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-3 mb-6">
      <div class="bg-gray-800 rounded-xl p-4">
        <p class="text-xs text-gray-400">Toxic Detected</p>
        <div id="toxic-count" class="text-3xl font-semibold text-red-400">7</div>
      </div>
      <div class="bg-gray-800 rounded-xl p-4">
        <p class="text-xs text-gray-400">Hidden/Blurred</p>
        <div id="hidden-count" class="text-3xl font-semibold text-amber-400">5</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="space-y-4">
      <div>
        <label class="flex items-center justify-between text-sm">
          <span>Sensitivity</span>
          <span id="threshold-value" class="font-mono">0.75</span>
        </label>
        <input type="range" id="threshold-slider" min="0.5" max="0.95" step="0.05" value="0.75" 
               class="w-full accent-emerald-500">
      </div>

      <div class="flex items-center justify-between">
        <span class="text-sm">Auto Blur Toxic Comments</span>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="auto-blur" checked class="sr-only peer">
          <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-emerald-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
        </label>
      </div>
    </div>

    <!-- Test Box -->
    <div class="mt-6">
      <p class="text-sm mb-2">Test a message</p>
      <textarea id="test-text" rows="3" 
                class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm resize-y"
                placeholder="Paste any comment here..."></textarea>
      <button id="test-btn"
              class="mt-2 w-full bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg font-medium">
        Check Toxicity
      </button>
      <div id="test-result" class="mt-3 text-sm"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
