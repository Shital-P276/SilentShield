<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SilentShield - Site Blocked</title>
  <style>
    body {
      background-color: #111416; 
      color: #dde4ec;           
      font-family: 'IBM Plex Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background: #181c20;      
      border: 1px solid #e05c6e; 
      border-radius: 8px;       
      padding: 40px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { 
      color: #e05c6e; 
      margin-top: 0;
      font-size: 24px;
      letter-spacing: -0.5px;
    }
    p { 
      color: #6b7e93; 
      line-height: 1.6; 
      font-size: 13px; 
      margin-bottom: 20px;
    }
    .url-box {
      background: #111416;
      padding: 14px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace; 
      color: #d4913a; 
      margin: 20px 0;
      word-break: break-all;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .btn {
      background: #34c77b; 
      color: #111416;
      border: none;
      padding: 12px 28px;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚠️ Access Blocked</h1>
    <p>SilentShield has intercepted this request because the destination matches your blocked keywords or known malicious domains.</p>
    
    <div class="url-box" id="blocked-url">Threat Blocked by SilentShield</div>
    
    <button id="back-btn" class="btn">Return to Safety</button>
  </div>

  <!-- Link to the external JavaScript file to satisfy CSP -->
  <script src="warning.js"></script>
</body>
</html>
