<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SilentShield - Site Blocked</title>
  <style>
    body {
      background-color: #111416;
      color: #dde4ec;
      font-family: 'IBM Plex Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background: #181c20;
      border: 1px solid #e05c6e;
      border-radius: 8px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { color: #e05c6e; margin-top: 0; }
    p { color: #6b7e93; line-height: 1.6; }
    .url-box {
      background: #111416;
      padding: 12px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      color: #d4913a;
      margin: 20px 0;
      word-break: break-all;
    }
    .btn {
      background: #34c77b;
      color: #111416;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }
    .btn:hover { background: #2ea868; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚠️ Access Blocked</h1>
    <p>SilentShield has prevented you from visiting this website because it is flagged as a malicious, phishing, or restricted domain.</p>
    
    <div class="url-box" id="blocked-url">Loading...</div>
    
    <a href="javascript:history.back()" class="btn">Go Back to Safety</a>
  </div>

  <script>
    // Grab the URL that was blocked from the query parameters to show the user
    const params = new URLSearchParams(window.location.search);
    const blockedUrl = params.get('blocked');
    document.getElementById('blocked-url').textContent = blockedUrl ? blockedUrl : "Unknown URL";
  </script>
</body>
</html>
